<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Meal → Shopping List</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Meal → Shopping List</h1>

<div class="controls">

<input id="meal" placeholder="Enter meal">

<select id="servings">
<option value="2">2 servings</option>
<option value="4" selected>4 servings</option>
<option value="6">6 servings</option>
</select>

<button id="generate">Generate</button>
<button id="copy">Copy List</button>
<button id="clear">Clear</button>

</div>

<div id="status"></div>

<div id="results"></div>

</div>

<script src="script.js"></script>

</body>
</html>
