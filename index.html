<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe to Shopping List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Recipe to Shopping List</h1>
    <p>Paste a recipe below and extract the ingredients into a shopping list.</p>

    <textarea id="recipeInput" placeholder="Paste your recipe here..."></textarea>

    <div class="buttons">
      <button id="extractBtn">Extract Ingredients</button>
      <button id="copyBtn">Copy List</button>
      <button id="clearBtn">Clear</button>
    </div>

    <h2>Shopping List</h2>
    <ul id="shoppingList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
