<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meal → Shopping List</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<img src="/food.png" class="hero-art" alt="food">

<h1>Meal → Shopping List</h1>
<p class="subtitle">Type a meal, choose servings, generate a clean shopping list.</p>

<div class="controls">

<input id="mealInput" placeholder="Enter meal">

<select id="servings">
<option value="2">2 servings</option>
<option value="4" selected>4 servings</option>
<option value="6">6 servings</option>
<option value="8">8 servings</option>
</select>

<button class="generate" id="generateBtn">Generate</button>
<button class="add-meal" id="addMealBtn">Add Meal</button>
<button class="copy" id="copyBtn">Copy List</button>
<button class="clear" id="clearBtn">Clear</button>

</div>

<div id="mealChips"></div>

<p class="status" id="status"></p>

<div id="shoppingList" class="empty-state">
Your shopping list is empty
</div>

</div>

<script src="script.js"></script>

</body>
</html>
