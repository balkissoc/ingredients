<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Shopping List</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🍽 Meal → Shopping List</h1>

<div class="controls">

<input id="mealInput" placeholder="Type a meal e.g. butter chicken">

<select id="servings">
<option value="2">2 servings</option>
<option value="4" selected>4 servings</option>
<option value="6">6 servings</option>
<option value="8">8 servings</option>
</select>

<button id="generateBtn">Generate</button>
<button id="addMealBtn">Add Meal</button>

</div>

<div id="mealList"></div>

<div class="actionBar">

<button id="copyBtn">Copy List</button>
<button id="clearBtn">Clear</button>

</div>

<p id="status"></p>

<h2>Shopping List</h2>

<div id="shoppingList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
